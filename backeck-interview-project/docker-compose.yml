services:
  redis:
    image: redis:8
    container_name: ai-mock-redis
    restart: unless-stopped

    ports:
      - '6379:6379'

    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: ai-mock-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 12345678

    ports:
      - '9000:9000'
      - '9001:9001'

    volumes:
      - minio_data:/data

volumes:
  redis_data:
  minio_data: