services:
  redis:
    image: redis:8
    container_name: ai-mock-redis
    restart: unless-stopped

    command: redis-server --requirepass ${REDIS_PASSWORD}

    ports:
      - '6379:6379'

    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: ai-mock-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}

    ports:
      - '9000:9000'
      - '9001:9001'

    volumes:
      - minio_data:/data


  mysql:
    image: mysql:8.0
    container_name: ai-mock-mysql
    restart: unless-stopped

    ports:
      - '3306:3306'

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}

    volumes:
      - mysql_data:/var/lib/mysql
      
volumes:
  redis_data:
  minio_data:
  mysql_data: