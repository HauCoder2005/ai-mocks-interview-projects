services:
  redis:
    image: redis:8
    container_name: ai-mock-redis
    restart: unless-stopped

    command: redis-server --requirepass ${REDIS_PASSWORD}

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: ai-mock-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  speech-transcription-service:
    build:
      context: ./ai-services/speech-transcription-service
    container_name: ai-mock-speech-transcription
    restart: unless-stopped

    environment:
      SERVICE_NAME: speech-transcription-service
      XDG_CACHE_HOME: /root/.cache
      TRANSCRIPTION_MODEL_NAME: ${TRANSCRIPTION_MODEL_NAME:-small}
      TRANSCRIPTION_LANGUAGE: ${TRANSCRIPTION_LANGUAGE:-vi}
      AI_INTERNAL_SERVICE_TOKEN: ${AI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      INTERNAL_SERVICE_TOKEN: ${AI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}

      TRANSCRIPTION_MAX_AUDIO_MB: ${TRANSCRIPTION_MAX_AUDIO_MB:-25}
      TRANSCRIPTION_TEMP_DIR: ${TRANSCRIPTION_TEMP_DIR:-temp}
      TRANSCRIPTION_MAX_CONCURRENCY: ${TRANSCRIPTION_MAX_CONCURRENCY:-1}

      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_INTERVIEW_AUDIO_BUCKET:-interview-audio-bucket}
      MINIO_SECURE: "false"

    ports:
      - "8001:8001"

    depends_on:
      - minio

    volumes:
      - whisper_cache:/root/.cache/whisper
      

  interview-agent-service:
    build:
      context: ./ai-services/interview-agent-service
    container_name: ai-mock-interview-agent
    restart: unless-stopped

    ports:
      - "8002:8002"

    environment:
      SERVICE_NAME: interview-agent-service
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      INTERVIEW_AGENT_MODEL: ${INTERVIEW_AGENT_MODEL:-qwen2.5:3b}
      INTERVIEW_AGENT_TEMPERATURE: ${INTERVIEW_AGENT_TEMPERATURE:-0.2}
      INTERVIEW_AGENT_TIMEOUT_MS: ${INTERVIEW_AGENT_TIMEOUT_MS:-120000}
      INTERVIEW_AGENT_NUM_CTX: ${INTERVIEW_AGENT_NUM_CTX:-1024}
      INTERVIEW_AGENT_NUM_PREDICT: ${INTERVIEW_AGENT_NUM_PREDICT:-256}
      AI_INTERNAL_SERVICE_TOKEN: ${AI_INTERNAL_SERVICE_TOKEN}
      INTERNAL_SERVICE_TOKEN: ${AI_INTERNAL_SERVICE_TOKEN}

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  minio_data:
  whisper_cache:
